name: Check
on:
  push:
  pull_request:
env:
  CARGO_TERM_COLOR: always
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: rustup component add clippy
      - run: SCCACHE_GHA_ENABLED=true RUSTC_WRAPPER=sccache cargo clippy
        working-directory: ./source/openfdap
      - run: SCCACHE_GHA_ENABLED=true RUSTC_WRAPPER=sccache cargo clippy
        working-directory: ./source/fdap
